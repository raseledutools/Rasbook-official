name: RasBook CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # 1. Lint
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run lint
        run: npm run lint || true

  # ─────────────────────────────────────────
  # 2. Web Build + Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build web
        run: npx expo export --platform web
        env:
          NODE_ENV: production
      - name: Add .nojekyll
        run: touch ./dist/.nojekyll
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  # ─────────────────────────────────────────
  # 3. Android APK → GitHub Releases
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 🔑 keytool ব্যবহার করার জন্য Java সেটআপ করা হলো
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # EAS এর Interactive error এড়াতে Git setup
      - name: Fix git working tree for EAS
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # EAS-এ build submit করো এবং JSON output নিরাপদভাবে নাও
      - name: Build APK on EAS (wait for completion)
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json | tail -n 1 > build_output.json
          cat build_output.json || true

      # Build output থেকে APK URL বের করো (Safe Python script)
      - name: Extract APK URL
        id: apk_url
        run: |
          URL=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('build_output.json'))
              if isinstance(data, list):
                  print(data[0].get('artifacts', {}).get('buildUrl', ''))
              else:
                  print(data.get('artifacts', {}).get('buildUrl', ''))
          except Exception as e:
              print('')
          ")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "APK URL: $URL"

      # APK download করো
      - name: Download APK
        if: steps.apk_url.outputs.url != ''
        run: |
          curl -L "${{ steps.apk_url.outputs.url }}" -o rasbook.apk
          ls -lh rasbook.apk

      # 🔑 Download করা আসল APK থেকে সরাসরি SHA-1 বের করো (100% Fail-proof & Accurate)
      - name: Print REAL APK SHA-1
        if: steps.apk_url.outputs.url != ''
        run: |
          echo "=========================================="
          echo "    REAL SHA-1 FROM EAS SIGNED APK        "
          echo "=========================================="
          keytool -printcert -jarfile rasbook.apk | grep "SHA1:" || true
          echo "=========================================="
        continue-on-error: true

      # GitHub Release বানাও এবং APK attach করো
      - name: Create GitHub Release with APK
        if: steps.apk_url.outputs.url != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 RasBook APK — Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          body: |
            ## RasBook Android APK

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### ⬇️ Download
            নিচের `rasbook.apk` file-এ click করে download করো।

            ### Install করতে
            1. APK download করো
            2. ফোনে Settings → Unknown Sources → Allow
            3. APK install করো
          files: rasbook.apk
          token: ${{ secrets.GITHUB_TOKEN }}
