name: RasBook CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # 1. Lint
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # স্পিড বাড়ানোর জন্য ক্যাশ অন করা হলো
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run lint
        run: npm run lint || true

  # ─────────────────────────────────────────
  # 2. Web Build + Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build web
        run: npx expo export --platform web
        env:
          NODE_ENV: production
      - name: Add .nojekyll
        run: touch ./dist/.nojekyll
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  # ─────────────────────────────────────────
  # 3. Android APK → GitHub Releases (SUPER FAST LOCAL MODE)
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # লোকাল অ্যান্ড্রয়েড বিল্ডের জন্য জাভা সেটআপ
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ⚡ গ্রেডল বিল্ড সুপার ফাস্ট করার জন্য অটোমেটিক ক্যাশ সেটআপ
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ⚡ এক্সপো সার্ভারের কিউ এড়াতে সরাসরি গিটহাব রানারেই APK বিল্ড করো (সুপার ফাস্ট মোড)
      - name: Build APK Locally on GitHub Runner
        run: |
          eas build \
            --local \
            --platform android \
            --profile preview \
            --non-interactive

      # জেনারেট হওয়া APK ফাইলটি খুঁজে বের করা এবং রিনেম করা
      - name: Locate and Prepare APK File
        run: |
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" ./rasbook.apk
            echo "APK successfully located and copied."
          else
            echo "Error: APK generation failed!"
            exit 1
          fi

      # 🔑 তৈরি হওয়া আসল APK থেকে সরাসরি SHA-1 প্রিন্ট করো (ফায়ারবেস সেটআপের জন্য)
      - name: Print REAL APK SHA-1
        run: |
          echo "=========================================="
          echo "          REAL APK SHA-1                  "
          echo "=========================================="
          keytool -printcert -jarfile rasbook.apk | grep "SHA1:" || true
          echo "=========================================="
        continue-on-error: true

      # GitHub Release তৈরি করো এবং সরাসরি APK ফাইলটি অ্যাটাচ করে দাও
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 RasBook APK — Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          body: |
            ## RasBook Android APK (Super Fast Build)

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### ⬇️ Download
            নিচের `rasbook.apk` ফাইলে ক্লিক করে সরাসরি ডাউনলোড করে ফোনে ইনস্টল করুন।
          files: rasbook.apk
          token: ${{ secrets.GITHUB_TOKEN }}
