# .github/workflows/ci.yml
name: RasBook CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# GitHub Pages-এ পুশ করার জন্য পারমিশন সেট করা হলো
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # 1. Lint & Type Check
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        # || true যুক্ত করা হলো যাতে এরর আসলেও বিল্ড স্কিপ না হয়
        run: npm run lint || true

  # ─────────────────────────────────────────
  # 2. EAS Build — Android (APK)
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        run: eas build --platform android --profile preview --non-interactive

  # ─────────────────────────────────────────
  # 3. EAS Build — iOS (simulator)
  # ─────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS simulator
        run: eas build --platform ios --profile preview --non-interactive

  # ─────────────────────────────────────────
  # 4. Web Deploy to GitHub Pages (Vercel-এর বিকল্প)
  # ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npx expo export --platform web

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
