name: RasBook CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache শুধু তখনই কাজ করে যখন package-lock.json আছে।
          # যদি না থাকে তাহলে এই লাইনটি মুছে দাও অথবা package-lock.json কমিট করো।
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run lint
        run: npm run lint || true


  # ─────────────────────────────────────────
  # 2. DEPLOY WEB → GitHub Pages
  # ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages


  # ─────────────────────────────────────────
  # 3. BUILD ANDROID APK via EAS
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Expo / EAS CLI সেটআপ
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # EAS রিমোট বিল্ড — JSON আউটপুট ফাইলে সেভ
      - name: Build APK on EAS
        run: eas build --platform android --profile preview --non-interactive --wait --json 2>/dev/null | tee build_output.json

      # APK URL parse করা (robust Python script)
      - name: Extract APK URL
        id: apk_url
        run: |
          URL=$(python3 - <<'EOF'
          import json, sys

          try:
              with open("build_output.json") as f:
                  raw = f.read().strip()

              # EAS sometimes prints non-JSON lines before the JSON blob
              # Find the first '[' or '{' to start parsing
              start = min(
                  (raw.index(c) for c in ('[', '{') if c in raw),
                  default=0
              )
              data = json.loads(raw[start:])

              build = data[0] if isinstance(data, list) else data

              # Try common key locations
              url = (
                  build.get("artifacts", {}).get("buildUrl")
                  or build.get("buildUrl")
                  or (build.get("artifacts", [{}])[0].get("buildUrl") if isinstance(build.get("artifacts"), list) else None)
                  or ""
              )
              print(url)
          except Exception as e:
              print(f"Parse error: {e}", file=sys.stderr)
              print("")
          EOF
          )
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "APK URL: $URL"

      # URL না পেলে বিল্ড লগ দেখাও
      - name: Show build output on failure
        if: steps.apk_url.outputs.url == ''
        run: |
          echo "⚠️  APK URL পাওয়া যায়নি। EAS build_output.json:"
          cat build_output.json
          exit 1

      # APK ডাউনলোড
      - name: Download APK
        run: |
          echo "Downloading from: ${{ steps.apk_url.outputs.url }}"
          curl -fL "${{ steps.apk_url.outputs.url }}" -o rasbook.apk
          echo "APK size: $(du -sh rasbook.apk | cut -f1)"

      # APK SHA-1 (aapt2 দিয়ে — keytool jarfile সব APKে কাজ করে না)
      - name: Print APK SHA-1 for Firebase
        run: |
          echo "=== APK SHA-1 (Firebase-এর জন্য) ==="
          # পদ্ধতি ১: keytool (signed APK হলে কাজ করে)
          keytool -printcert -jarfile rasbook.apk 2>/dev/null | grep -i "SHA1:" || true
          # পদ্ধতি ২: sha1sum (সবসময় কাজ করে, ফাইলের hash)
          echo "File SHA-1: $(sha1sum rasbook.apk | awk '{print $1}')"
          echo "======================================"
        continue-on-error: true

      # GitHub Release তৈরি ও APK আপলোড
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "📱 RasBook APK — Build #${{ github.run_number }}"
          body: |
            ### 🤖 Android APK — Build #${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Built at:** ${{ github.event.head_commit.timestamp }}

            ⬇️ নিচের `rasbook.apk` ডাউনলোড করে ইন্সটল করুন।
          files: rasbook.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
