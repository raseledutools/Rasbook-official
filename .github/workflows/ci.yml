name: RasBook CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # 1. Lint
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run lint
        run: npm run lint || true

  # ─────────────────────────────────────────
  # 2. Web Build + Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # react-native-callkeep web-এ চলে না, তাই stub বানাও
      - name: Stub native-only modules for web
        run: |
          mkdir -p node_modules/react-native-callkeep
          echo "module.exports = {};" > node_modules/react-native-callkeep/index.js
          echo '{"name":"react-native-callkeep","version":"4.3.12","main":"index.js"}' > node_modules/react-native-callkeep/package.json

          mkdir -p node_modules/react-native-voip-push-notification
          echo "module.exports = {};" > node_modules/react-native-voip-push-notification/index.js
          echo '{"name":"react-native-voip-push-notification","version":"3.3.1","main":"index.js"}' > node_modules/react-native-voip-push-notification/package.json

      - name: Build web
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  # ─────────────────────────────────────────
  # 3. Android APK via EAS → GitHub Releases
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json > build_output.json
          cat build_output.json

      - name: Extract APK URL
        id: apk_url
        run: |
          URL=$(python3 -c "
          import json
          data = json.load(open('build_output.json'))
          if isinstance(data, list):
              print(data[0].get('artifacts', {}).get('buildUrl', ''))
          else:
              print(data.get('artifacts', {}).get('buildUrl', ''))
          ")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "APK URL: $URL"

      - name: Download APK
        if: steps.apk_url.outputs.url != ''
        run: |
          curl -L "${{ steps.apk_url.outputs.url }}" -o rasbook.apk
          ls -lh rasbook.apk

      - name: Create GitHub Release with APK
        if: steps.apk_url.outputs.url != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 RasBook APK — Build #${{ github.run_number }}"
          body: |
            ## RasBook Android APK — Build #${{ github.run_number }}

            **Commit:** `${{ github.sha }}`

            ### ✅ এই build-এ আছে
            - 🔒 Real E2E Encryption (AES-GCM 256-bit)
            - 📎 File Sharing — Photo, Video, Audio, Document
            - 📞 Lock Screen Call Fix
            - 🔔 Background Call Notification

            ### ⬇️ Install
            1. `rasbook.apk` download করো
            2. Settings → Security → Unknown Sources → Allow
            3. APK install করো
          files: rasbook.apk
          token: ${{ secrets.GITHUB_TOKEN }}
