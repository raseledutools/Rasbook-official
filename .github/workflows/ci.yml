name: RasBook CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run lint
        run: npm run lint || true

  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build web
        run: npx expo export --platform web
        env:
          NODE_ENV: production
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # EAS বিল্ড রিমোটলি রান করা হবে কিন্তু --wait কমান্ডের মাধ্যমে বিল্ড শেষ হওয়া পর্যন্ত অপেক্ষা করবে
      - name: Build APK on EAS
        run: |
          eas build --platform android --profile preview --non-interactive --wait --json > build_output.json
          cat build_output.json

      # Build output থেকে APK URL বের করা
      - name: Extract APK URL
        id: apk_url
        run: |
          URL=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('build_output.json'))
              # আউটপুট যদি লিস্ট হয় তবে প্রথমটা, নাহলে পুরোটা
              build_data = data[0] if isinstance(data, list) else data
              print(build_data.get('artifacts', [{}])[0].get('buildUrl', ''))
          except:
              print('')
          ")
          echo "url=$URL" >> $GITHUB_OUTPUT

      # APK ডাউনলোড করা
      - name: Download APK
        if: steps.apk_url.outputs.url != ''
        run: |
          curl -L "${{ steps.apk_url.outputs.url }}" -o rasbook.apk

      # SHA-1 বের করা (ডাউনলোড করা APK ফাইল থেকে)
      - name: Print REAL APK SHA-1
        if: steps.apk_url.outputs.url != ''
        run: |
          echo "=== APK SHA-1 (Firebase-এর জন্য এটি কপি করুন) ==="
          keytool -printcert -jarfile rasbook.apk | grep "SHA1:"
          echo "==============================================="
        continue-on-error: true

      # GitHub Release তৈরি ও APK অ্যাটাচ করা
      - name: Create GitHub Release
        if: steps.apk_url.outputs.url != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 RasBook APK — Build #${{ github.run_number }}"
          files: rasbook.apk
          token: ${{ secrets.GITHUB_TOKEN }}
