name: RasBook CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # 1. Lint
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run lint
        run: npm run lint || true

  # ─────────────────────────────────────────
  # 2. Web Build + Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Stub native-only modules for web
        run: |
          mkdir -p node_modules/react-native-callkeep
          echo "module.exports = {};" > node_modules/react-native-callkeep/index.js
          echo '{"name":"react-native-callkeep","version":"4.3.12","main":"index.js"}' > node_modules/react-native-callkeep/package.json

          mkdir -p node_modules/react-native-voip-push-notification
          echo "module.exports = {};" > node_modules/react-native-voip-push-notification/index.js
          echo '{"name":"react-native-voip-push-notification","version":"3.3.1","main":"index.js"}' > node_modules/react-native-voip-push-notification/package.json

      - name: Build web
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: Inject vector-icons font CSS for web
        run: |
          FONT_CSS='<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />'
          INDEX="./dist/index.html"
          if [ -f "$INDEX" ]; then
            sed -i "s|</head>|$FONT_CSS</head>|" "$INDEX"
            echo "Font CSS injected"
          fi

      - name: Fix asset paths for GitHub Pages
        run: |
          sed -i 's|src="/|src="/Rasbook-official/|g' ./dist/index.html || true
          sed -i 's|href="/|href="/Rasbook-official/|g' ./dist/index.html || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  # ─────────────────────────────────────────
  # 3. Android APK (EAS ছাড়া, local Gradle)
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild — generate android folder
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "📱 RasBook APK — Build #${{ github.run_number }}"
          body: |
            ## RasBook Android APK — Build #${{ github.run_number }}

            **Commit:** `${{ github.sha }}`

            ### ⬇️ Install
            1. `rasbook.apk` download করো
            2. Settings → Security → Unknown Sources → Allow
            3. APK install করো
          files: android/app/build/outputs/apk/release/app-release*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
