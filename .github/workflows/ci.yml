name: RasBook CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # 1. Lint
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run lint
        run: npm run lint || true

  # ─────────────────────────────────────────
  # 2. Web Build + Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web (static)
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  # ─────────────────────────────────────────
  # 3. Android APK (EAS) + Upload as Release
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (EAS)
        id: eas_build
        run: |
          BUILD_URL=$(eas build --platform android --profile preview --non-interactive --json | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['artifacts']['buildUrl'] if isinstance(data,list) else data.get('artifacts',{}).get('buildUrl',''))" 2>/dev/null || echo "")
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download APK from EAS
        if: steps.eas_build.outputs.build_url != ''
        run: |
          curl -L "${{ steps.eas_build.outputs.build_url }}" -o rasbook.apk

      - name: Upload APK as GitHub Release
        if: steps.eas_build.outputs.build_url != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "RasBook APK — Build #${{ github.run_number }}"
          body: |
            ## 📱 RasBook Android APK
            Auto-built from commit `${{ github.sha }}`
            
            **Download করো:** নিচের `rasbook.apk` file-এ click করো।
          files: rasbook.apk
          token: ${{ secrets.GITHUB_TOKEN }}
