name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: 'npm'

      # ── 3. Java (JDK 17) ─────────────────────────────────────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Install dependencies ───────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 5. Generate native android folder (Expo prebuild) ────────
      - name: Expo Prebuild (generate android folder)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      # ── 6. Make gradlew executable ────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 7. Cache Gradle ──────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      # ── 8. Build APK ─────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"

      # ── 9. Upload APK as artifact ─────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rasbook-release-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
