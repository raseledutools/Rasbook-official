name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (generate android folder)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Force arm64-v8a only (fixes WebRTC crash on 64-bit phones)
        run: |
          GRADLE_FILE="android/app/build.gradle"
          # Remove any existing abiFilters
          sed -i '/abiFilters/d' "$GRADLE_FILE"
          sed -i '/ndk {/d' "$GRADLE_FILE"
          # Add arm64-v8a only inside defaultConfig
          sed -i '/defaultConfig {/a\        ndk {\n            abiFilters "arm64-v8a"\n        }' "$GRADLE_FILE"
          echo "=== defaultConfig section ==="
          grep -A 20 "defaultConfig {" "$GRADLE_FILE" | head -25

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rasbook-release-apk
          path: android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
